name: iOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test Rocio iOS
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      - name: Build app for iOS Simulator
        run: |
          xcodebuild \
            -project ios/Rocio.xcodeproj \
            -scheme Rocio \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Pick available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_LINE="$(xcrun simctl list devices available | grep -E 'iPhone .*\([0-9A-Fa-f-]{36}\)' | head -n 1 || true)"
          SIMULATOR_NAME="$(printf '%s' "$SIMULATOR_LINE" | sed -E 's/^[[:space:]]*(iPhone [^(]+) \(.*$/\1/' | xargs)"
          SIMULATOR_UDID="$(printf '%s' "$SIMULATOR_LINE" | sed -E 's/.*\(([0-9A-Fa-f-]{36})\).*/\1/')"
          if [ -z "$SIMULATOR_NAME" ] || [ -z "$SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "name=$SIMULATOR_NAME" >> "$GITHUB_OUTPUT"
          echo "udid=$SIMULATOR_UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIMULATOR_NAME ($SIMULATOR_UDID)"

      - name: Boot iPhone simulator
        run: |
          xcrun simctl boot "${{ steps.simulator.outputs.udid }}" 2>/dev/null || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.udid }}" -b

      - name: Run unit tests on iOS Simulator
        run: |
          xcodebuild \
            -project ios/Rocio.xcodeproj \
            -scheme Rocio \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -destination-timeout 120 \
            CODE_SIGNING_ALLOWED=NO \
            test
